# frontend/service.yaml — ClusterIP service for the Next.js frontend.
# The Ingress routes / to this service on port 3000.
apiVersion: v1
kind: Service
metadata:
  name: {{ printf "%s-%s" .Chart.Name .Values.frontend.name }}
  namespace: {{ include "clipsync.namespace" . }}
  labels:
    {{- include "clipsync.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.frontend.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "clipsync.frontendSelectorLabels" . | nindent 4 }}
