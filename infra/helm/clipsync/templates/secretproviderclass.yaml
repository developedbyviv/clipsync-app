# secretproviderclass.yaml — Azure Key Vault CSI driver configuration.
#
# How this works:
#   1. The azureKeyvaultSecretsProvider AKS addon (enabled in aks.bicep) provides
#      the CSI driver at secrets-store.csi.k8s.io
#   2. Pods mount a volume using this driver — on mount, the driver fetches
#      secrets from Key Vault using the pod's Workload Identity token
#   3. The secretObjects block syncs the fetched secrets into a regular
#      Kubernetes Secret (clipsync-secrets) so envFrom can reference them
#   4. The Secret is only created when at least one pod mounts the volume
#
# No credentials are stored in this file — authentication is via Workload Identity.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: clipsync-secrets
  namespace: {{ include "clipsync.namespace" . }}
  labels:
    {{- include "clipsync.labels" . | nindent 4 }}
spec:
  provider: azure
  parameters:
    # usePodIdentity: false — we use Workload Identity (OIDC), not AAD Pod Identity v1
    usePodIdentity: "false"
    # clientID: the Azure AD managed identity that has Key Vault Secrets User role
    # Set in values-dev.yaml / values-prod.yaml
    clientID: {{ .Values.keyVault.clientId | quote }}
    # Key Vault name — provisioned by Bicep (kv-clipsync-<env>-inc)
    keyvaultName: {{ .Values.keyVault.name | quote }}
    # Azure AD tenant ID
    tenantId: {{ .Values.keyVault.tenantId | quote }}
    # List of secrets to fetch from Key Vault
    objects: |
      array:
        - |
          objectName: postgres-connection-string
          objectType: secret
        - |
          objectName: redis-connection-string
          objectType: secret
        - |
          objectName: jwt-secret
          objectType: secret
        - |
          objectName: session-secret
          objectType: secret
        - |
          objectName: appinsights-connection-string
          objectType: secret

  # Sync fetched Key Vault secrets into a Kubernetes Secret.
  # This Secret is referenced via envFrom in the API and frontend Deployments.
  # The Secret is automatically kept in sync with Key Vault on rotation.
  secretObjects:
    - secretName: clipsync-secrets
      type: Opaque
      data:
        - objectName: postgres-connection-string
          key: DATABASE_URL
        - objectName: redis-connection-string
          key: REDIS_URL
        - objectName: jwt-secret
          key: JWT_SECRET
        - objectName: session-secret
          key: SESSION_SECRET
        - objectName: appinsights-connection-string
          key: APPLICATIONINSIGHTS_CONNECTION_STRING
