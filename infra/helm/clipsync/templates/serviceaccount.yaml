# serviceaccount.yaml — Kubernetes ServiceAccount linked to Azure Workload Identity.
# The annotation azure.workload.identity/client-id tells the Workload Identity
# webhook which Azure AD managed identity to federate with this SA.
# Pods using this SA automatically receive short-lived Azure AD tokens —
# no stored credentials required.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.name }}
  namespace: {{ include "clipsync.namespace" . }}
  labels:
    {{- include "clipsync.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
