# Development overrides — merge with docker-compose.yml:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build

services:
  api:
    build: !reset null
    image: node:20-alpine
    container_name: clipsync_api_dev
    working_dir: /app
    volumes:
      - ./apps/api:/app
      - /app/node_modules        # anonymous volume keeps container node_modules isolated
    command: sh -c "npm install && npm run dev"
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: ${DATABASE_URL:-postgresql://clipsync_user:clipsync_pass@postgres:5432/clipsync}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}

  frontend:
    build: !reset null
    image: node:20-alpine
    container_name: clipsync_frontend_dev
    working_dir: /app
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules
      - /app/.next
    command: sh -c "npm install && npm run dev"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:-http://localhost:4000}
